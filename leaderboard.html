<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSDM — Leaderboard S5-MI-GI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --card: #161d2e; --border: #1e2d45;
    --accent: #3b82f6; --accent2: #06b6d4; --green: #10b981; --orange: #f59e0b;
    --red: #ef4444; --text: #f1f5f9; --muted: #64748b; --light: #94a3b8;
    --gold: #fbbf24; --silver: #94a3b8; --bronze: #cd7c3a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 1rem; height: 64px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
  .header-sub { font-size: 0.75rem; color: var(--muted); border-left: 1px solid var(--border); padding-left: 1rem; margin-left: 0.5rem; }
  .nav-link { margin-left: auto; color: var(--muted); text-decoration: none; font-size: 0.85rem; padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px; transition: all 0.2s; }
  .nav-link:hover { color: var(--text); border-color: var(--accent); }

  .hero { padding: 2.5rem 2rem 1.5rem; max-width: 1000px; margin: 0 auto; text-align: center; }
  .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 800; margin-bottom: 0.4rem; }
  .hero h1 span { background: linear-gradient(135deg, var(--gold), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { color: var(--muted); font-size: 0.9rem; }

  /* MODULE TABS */
  .modules-wrap { max-width: 1000px; margin: 1.5rem auto 0; padding: 0 2rem; overflow-x: auto; }
  .modules-tabs { display: flex; gap: 0.5rem; padding-bottom: 0.5rem; min-width: max-content; }
  .mod-tab { padding: 0.5rem 1rem; font-size: 0.8rem; font-weight: 500; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--muted); transition: all 0.2s; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
  .mod-tab.active { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.5); color: var(--accent); }
  .mod-tab:hover:not(.active) { color: var(--light); border-color: var(--light); }

  main { max-width: 1000px; margin: 1.5rem auto; padding: 0 2rem 3rem; }

  /* TOP 3 PODIUM */
  .podium { display: flex; justify-content: center; align-items: flex-end; gap: 1rem; margin-bottom: 2rem; }
  .podium-item { text-align: center; flex: 1; max-width: 180px; }
  .podium-card { border-radius: 16px 16px 0 0; padding: 1.2rem 0.8rem 1rem; position: relative; border: 1px solid var(--border); border-bottom: none; }
  .podium-card.gold { background: linear-gradient(180deg, rgba(251,191,36,0.15), rgba(251,191,36,0.05)); border-color: rgba(251,191,36,0.4); }
  .podium-card.silver { background: linear-gradient(180deg, rgba(148,163,184,0.12), rgba(148,163,184,0.04)); border-color: rgba(148,163,184,0.3); }
  .podium-card.bronze { background: linear-gradient(180deg, rgba(205,124,58,0.12), rgba(205,124,58,0.04)); border-color: rgba(205,124,58,0.3); }
  .podium-rank { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; }
  .rank-gold { color: var(--gold); } .rank-silver { color: var(--silver); } .rank-bronze { color: var(--bronze); }
  .podium-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin: 0 auto 0.6rem; display: block; border: 2px solid; }
  .podium-photo.gold-border { border-color: var(--gold); }
  .podium-photo.silver-border { border-color: var(--silver); }
  .podium-photo.bronze-border { border-color: var(--bronze); }
  .podium-avatar { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.6rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; border: 2px solid; }
  .podium-avatar.gold-border { border-color: var(--gold); color: var(--gold); background: rgba(251,191,36,0.1); }
  .podium-avatar.silver-border { border-color: var(--silver); color: var(--silver); background: rgba(148,163,184,0.1); }
  .podium-avatar.bronze-border { border-color: var(--bronze); color: var(--bronze); background: rgba(205,124,58,0.1); }
  .podium-name { font-size: 0.78rem; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 0.3rem; }
  .podium-score { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; }
  .score-gold { color: var(--gold); } .score-silver { color: var(--silver); } .score-bronze { color: var(--bronze); }
  .podium-bar { height: 8px; border-radius: 0; }
  .podium-bar.gold { background: var(--gold); height: 60px; }
  .podium-bar.silver { background: var(--silver); height: 40px; }
  .podium-bar.bronze { background: var(--bronze); height: 24px; }

  /* REST OF LIST */
  .leaderboard-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .lb-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; display: flex; align-items: center; gap: 1rem; transition: all 0.15s; }
  .lb-item:hover { border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.04); }
  .lb-rank { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; color: var(--muted); min-width: 28px; text-align: center; }
  .lb-photo { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  .lb-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; color: var(--accent); background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); flex-shrink: 0; }
  .lb-name { flex: 1; font-size: 0.88rem; font-weight: 500; }
  .lb-score { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
  .lb-badge { font-size: 0.68rem; padding: 2px 7px; border-radius: 999px; margin-left: 0.5rem; }
  .badge-v { background: rgba(16,185,129,0.15); color: var(--green); }
  .badge-r { background: rgba(245,158,11,0.15); color: var(--orange); }

  .loading { text-align: center; padding: 3rem; color: var(--muted); }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<header>
  <a class="logo" href="index.html">FSDM Portal</a>
  <div class="header-sub">S5 · MI-Génie Informatique · 2024-2025</div>
  <a class="nav-link" href="index.html">← Retour</a>
</header>

<div class="hero">
  <h1>🏆 <span>Leaderboard</span></h1>
  <p>Classement des étudiants par module — du meilleur au moins bon</p>
</div>

<div class="modules-wrap">
  <div class="modules-tabs" id="modulesTabs"></div>
</div>

<main id="mainContent">
  <div class="loading"><div class="spinner"></div>Chargement des données...</div>
</main>

<script>
let allStudents = [];
let modules = [];
let currentModule = '';

function getInitials(nom) {
  return nom.trim().split(/\s+/).map(p=>p[0]).slice(0,2).join('').toUpperCase();
}

function photoEl(student, size, borderClass) {
  const nom = student.nom || student.email.split('@')[0].replace('.',' ').toUpperCase();
  const ini = getInitials(nom);
  if (size === 'podium') {
    return `<img src="${student.photo}" class="podium-photo ${borderClass}" alt=""
      onerror="this.outerHTML='<div class=\\'podium-avatar ${borderClass}\\'>${ini}</div>'">`; 
  }
  return `<img src="${student.photo}" class="lb-photo" alt=""
    onerror="this.outerHTML='<div class=\\'lb-avatar\\'>${ini}</div>'">`; 
}

async function loadData() {
  try {
    const r = await fetch('students_data.json?t=' + Date.now());
    allStudents = await r.json();
  } catch(e) {
    document.getElementById('mainContent').innerHTML = '<div class="loading">⚠ students_data.json introuvable</div>';
    return;
  }

  // Extract all modules
  const modSet = new Set();
  allStudents.forEach(s => (s.notes||[]).forEach(n => modSet.add(n.module)));
  modules = [...modSet];

  // Build tabs
  const tabsEl = document.getElementById('modulesTabs');
  tabsEl.innerHTML = modules.map((m, i) =>
    `<button class="mod-tab ${i===0?'active':''}" onclick="selectModule('${m.replace(/'/g,"\\'")}', this)">${m}</button>`
  ).join('');

  if (modules.length > 0) selectModule(modules[0], tabsEl.children[0]);
}

function selectModule(moduleName, btn) {
  currentModule = moduleName;
  document.querySelectorAll('.mod-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderLeaderboard(moduleName);
}

function renderLeaderboard(moduleName) {
  // Collect all students with this module's note
  const ranked = [];
  allStudents.forEach(s => {
    const note = (s.notes||[]).find(n => n.module === moduleName);
    if (note && note.moyenne) {
      const score = parseFloat(note.moyenne);
      if (!isNaN(score)) {
        const nom = s.nom || s.email.split('@')[0].replace('.',' ').toUpperCase();
        ranked.push({ ...s, score, etat: note.etat, nom });
      }
    }
  });

  ranked.sort((a, b) => b.score - a.score);

  const main = document.getElementById('mainContent');
  if (ranked.length === 0) {
    main.innerHTML = '<div class="loading">Aucune note pour ce module</div>';
    return;
  }

  const colors = ['gold','silver','bronze'];
  const borders = ['gold-border','silver-border','bronze-border'];
  const rankSymbols = ['🥇','🥈','🥉'];
  const scoreClasses = ['score-gold','score-silver','score-bronze'];

  // PODIUM (top 3)
  const top3 = ranked.slice(0, 3);
  const podiumOrder = top3.length >= 2 ? [top3[1], top3[0], top3[2]].filter(Boolean) : top3;
  const podiumIndices = top3.length >= 2 ? [1, 0, 2] : [0];

  const podiumHTML = `<div class="podium">
    ${podiumOrder.map((s, pi) => {
      const origIdx = podiumIndices[pi];
      const col = colors[origIdx];
      const border = borders[origIdx];
      const sym = rankSymbols[origIdx];
      const sc = scoreClasses[origIdx];
      return `<div class="podium-item">
        <div class="podium-card ${col}">
          <div class="podium-rank rank-${col}">${sym}</div>
          ${photoEl(s, 'podium', border)}
          <div class="podium-name">${s.nom}</div>
          <div class="podium-score ${sc}">${s.score.toFixed(2)}</div>
        </div>
        <div class="podium-bar ${col}"></div>
      </div>`;
    }).join('')}
  </div>`;

  // REST (4+)
  const restHTML = ranked.slice(3).map((s, i) => {
    const rank = i + 4;
    const scoreColor = s.score >= 12 ? 'var(--green)' : s.score >= 10 ? 'var(--orange)' : 'var(--red)';
    const badgeCls = s.etat === 'Validé' ? 'badge-v' : 'badge-r';
    return `<div class="lb-item">
      <div class="lb-rank">${rank}</div>
      ${photoEl(s, 'list', '')}
      <div class="lb-name">${s.nom}</div>
      <span class="lb-badge ${badgeCls}">${s.etat}</span>
      <div class="lb-score" style="color:${scoreColor}">${s.score.toFixed(2)}</div>
    </div>`;
  }).join('');

  main.innerHTML = podiumHTML + `<div class="leaderboard-list">${restHTML}</div>`;
}

loadData();
</script>
</body>
</html>
