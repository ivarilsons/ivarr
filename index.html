<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSDM — Portail Étudiants S5-MI-GI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --card: #161d2e; --border: #1e2d45;
    --accent: #3b82f6; --accent2: #06b6d4; --green: #10b981; --orange: #f59e0b;
    --red: #ef4444; --text: #f1f5f9; --muted: #64748b; --light: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; align-items: center; gap: 1rem;
    height: 64px; position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-sub { font-size: 0.75rem; color: var(--muted); border-left: 1px solid var(--border); padding-left: 1rem; margin-left: 0.5rem; }
  .header-badge { margin-left: auto; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: var(--accent); font-size: 0.7rem; padding: 4px 10px; border-radius: 999px; font-weight: 500; }
  .hero { padding: 3rem 2rem 2rem; max-width: 900px; margin: 0 auto; text-align: center; }
  .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; line-height: 1.1; margin-bottom: 0.5rem; }
  .hero h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }
  .search-wrap { position: relative; max-width: 540px; margin: 0 auto; }
  .search-wrap svg { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted); width: 18px; height: 18px; pointer-events: none; }
  #searchInput { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.85rem 1rem 0.85rem 2.8rem; font-size: 0.95rem; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  #searchInput::placeholder { color: var(--muted); }
  .stats-row { display: flex; justify-content: center; gap: 2rem; margin-top: 1.5rem; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.75rem; color: var(--muted); }
  .tabs { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; gap: 0.5rem; border-bottom: 1px solid var(--border); }
  .tab { padding: 0.7rem 1.2rem; font-size: 0.85rem; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none; font-family: 'DM Sans', sans-serif; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--light); }
  main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  #gridView { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
  .student-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.2rem 1rem; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .student-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); opacity: 0; transition: opacity 0.2s; }
  .student-card:hover { border-color: rgba(59,130,246,0.4); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .student-card:hover::before { opacity: 1; }
  .card-photo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); margin: 0 auto 0.75rem; display: block; background: var(--surface); }
  .card-avatar { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; color: var(--accent); background: rgba(59,130,246,0.1); border: 2px solid rgba(59,130,246,0.3); margin: 0 auto 0.75rem; }
  .card-name { font-size: 0.78rem; font-weight: 500; color: var(--text); line-height: 1.3; margin-bottom: 0.3rem; }
  .card-cne { font-size: 0.65rem; color: var(--muted); font-family: monospace; }
  #listView { display: none; }
  .list-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.2rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; transition: all 0.15s; margin-bottom: 0.5rem; }
  .list-item:hover { border-color: rgba(59,130,246,0.4); background: rgba(59,130,246,0.05); }
  .list-photo { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  .list-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; color: var(--accent); background: rgba(59,130,246,0.1); flex-shrink: 0; }
  .list-info { flex: 1; }
  .list-name { font-size: 0.9rem; font-weight: 500; }
  .list-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; font-family: monospace; }
  .list-arrow { color: var(--muted); font-size: 1.2rem; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1.2rem; }
  .modal-photo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(59,130,246,0.4); flex-shrink: 0; }
  .modal-avatar { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem; color: var(--accent); background: rgba(59,130,246,0.1); border: 3px solid rgba(59,130,246,0.3); flex-shrink: 0; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 0.3rem; }
  .modal-meta { font-size: 0.78rem; color: var(--muted); line-height: 1.8; font-family: monospace; }
  .modal-close { margin-left: auto; background: var(--surface); border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; align-self: flex-start; transition: all 0.15s; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 1.5rem; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 0.75rem; }
  .notes-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .notes-table th { text-align: left; color: var(--muted); font-weight: 500; font-size: 0.72rem; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px; }
  .notes-table td { padding: 0.65rem 0.75rem; border-bottom: 1px solid rgba(30,45,69,0.5); color: var(--light); }
  .notes-table tr:last-child td { border-bottom: none; }
  .notes-table tr:hover td { background: rgba(59,130,246,0.04); }
  .badge { padding: 3px 8px; border-radius: 999px; font-size: 0.68rem; font-weight: 600; }
  .badge-success { background: rgba(16,185,129,0.15); color: var(--green); }
  .badge-warning { background: rgba(245,158,11,0.15); color: var(--orange); }
  .badge-danger { background: rgba(239,68,68,0.15); color: var(--red); }
  .note-score { font-weight: 600; font-size: 0.9rem; }
  .note-good { color: var(--green); } .note-mid { color: var(--orange); } .note-bad { color: var(--red); }
  .no-results { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }
  .empty-msg { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.85rem; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<header>
  <div class="logo">FSDM Portal</div>
  <div class="header-sub">S5 · MI-Génie Informatique · 2024-2025</div>
  <a class="nav-link" href="leaderboard.html" style="margin-left:auto">🏆 Leaderboard</a><div class="header-badge" id="totalBadge" style="margin-left:0.5rem">Chargement...</div>
</header>
<div class="hero">
  <h1>Portail <span>Étudiants</span></h1>
  <p>Recherchez un étudiant par nom ou CNE pour consulter ses notes</p>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Nom, prénom ou CNE..." autocomplete="off">
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num" id="statShown">0</div><div class="stat-label">Affichés</div></div>
    <div class="stat"><div class="stat-num" id="statOK">0</div><div class="stat-label">Avec notes</div></div>
  </div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchView('grid',this)">⊞ Grille</button>
  <button class="tab" onclick="switchView('list',this)">☰ Liste</button>
</div>
<main>
  <div id="gridView"></div>
  <div id="listView"></div>
  <div id="noResults" class="no-results" style="display:none">Aucun étudiant trouvé</div>
</main>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div id="modalPhotoWrap"></div>
      <div style="flex:1">
        <div class="modal-title" id="modalName">—</div>
        <div class="modal-meta" id="modalMeta">—</div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="section-title">Notes — Semestre 5</div>
      <div id="modalNotes"></div>
    </div>
  </div>
</div>
<script>
let allStudents = [];

function getInitials(nom) {
  return nom.trim().split(/\s+/).map(p=>p[0]).slice(0,2).join('').toUpperCase();
}

function imgWithFallback(src, initials, cls) {
  return `<img src="${src}" class="${cls}" alt="" onerror="this.outerHTML='<div class=\\'${cls.replace('photo','avatar')}\\'>${initials}</div>'">`; 
}

async function loadData() {
  try {
    const r = await fetch('students_data.json?t=' + Date.now());
    if (!r.ok) throw new Error('not found');
    allStudents = await r.json();
  } catch(e) {
    document.querySelector('.hero p').textContent = '⚠ students_data.json introuvable — lancez scraper.py dabord';
    return;
  }
  const withNotes = allStudents.filter(s => s.notes && s.notes.length > 0).length;
  document.getElementById('statTotal').textContent = allStudents.length;
  document.getElementById('statOK').textContent = withNotes;
  document.getElementById('totalBadge').textContent = allStudents.length + ' étudiants';
  render(allStudents);
}

function render(students) {
  const grid = document.getElementById('gridView');
  const list = document.getElementById('listView');
  document.getElementById('noResults').style.display = students.length === 0 ? 'block' : 'none';
  document.getElementById('statShown').textContent = students.length;

  grid.innerHTML = students.map(s => {
    const nom = s.nom || s.email.split('@')[0].replace('.',' ').toUpperCase();
    const ini = getInitials(nom);
    return `<div class="student-card" onclick='openModal(${JSON.stringify(s).replace(/'/g,"&#39;")})'>
      ${imgWithFallback(s.photo, ini, 'card-photo')}
      <div class="card-name">${nom}</div>
      <div class="card-cne">${s.cne}</div>
    </div>`;
  }).join('');

  list.innerHTML = students.map(s => {
    const nom = s.nom || s.email.split('@')[0].replace('.',' ').toUpperCase();
    const ini = getInitials(nom);
    const noteCount = s.notes ? s.notes.length : 0;
    return `<div class="list-item" onclick='openModal(${JSON.stringify(s).replace(/'/g,"&#39;")})'>
      ${imgWithFallback(s.photo, ini, 'list-photo')}
      <div class="list-info">
        <div class="list-name">${nom}</div>
        <div class="list-meta">CNE: ${s.cne} &nbsp;|&nbsp; ${noteCount} modules</div>
      </div>
      <div class="list-arrow">›</div>
    </div>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { render(allStudents); return; }
  render(allStudents.filter(s =>
    (s.nom||'').toLowerCase().includes(q) ||
    s.email.toLowerCase().includes(q) ||
    s.cne.toLowerCase().includes(q)
  ));
});

function switchView(view, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('gridView').style.display = view === 'grid' ? 'grid' : 'none';
  document.getElementById('listView').style.display = view === 'list' ? 'block' : 'none';
}

function openModal(s) {
  const nom = s.nom || s.email.split('@')[0].replace('.',' ').toUpperCase();
  const ini = getInitials(nom);
  document.getElementById('modalName').textContent = nom;
  document.getElementById('modalMeta').innerHTML = `CNE: ${s.cne}<br>CIN: ${s.cin}<br>${s.email}`;
  document.getElementById('modalPhotoWrap').innerHTML = imgWithFallback(s.photo, ini, 'modal-photo');

  const notesDiv = document.getElementById('modalNotes');
  if (s.notes && s.notes.length > 0) {
    notesDiv.innerHTML = `<table class="notes-table">
      <thead><tr><th>Module</th><th>Sem.</th><th>Moyenne</th><th>État</th></tr></thead>
      <tbody>${s.notes.map(n => {
        const sc = parseFloat(n.moyenne);
        const cls = sc >= 12 ? 'note-good' : sc >= 10 ? 'note-mid' : 'note-bad';
        const bc = n.etat === 'Validé' ? 'badge-success' : 'badge-warning';
        return `<tr><td>${n.module}</td><td>${n.semestre}</td>
          <td><span class="note-score ${cls}">${n.moyenne}</span></td>
          <td><span class="badge ${bc}">${n.etat}</span></td></tr>`;
      }).join('')}</tbody></table>`;
  } else {
    notesDiv.innerHTML = `<div class="empty-msg">${s.error ? '⚠ Login échoué pour cet étudiant' : 'Aucune note disponible'}</div>`;
  }
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

loadData();
</script>
</body>
</html>
